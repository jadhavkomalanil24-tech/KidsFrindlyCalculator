<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kids Fun Calculator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="star star1"></div>
    <div class="star star2"></div>
    <div class="star star3"></div>

    <!-- Floating Balloons -->

    <div class="balloon balloon1"></div>
    <div class="balloon balloon2"></div>

    <!-- Main Container -->

    <div class="container">


        <h1 class="title">🌈 Fun Math 🌈</h1>

        <div class="calculator">

            <input type="text" id="display" readonly>

            <div class="buttons">

                <button class="red" onclick="clearDisplay()">
                    C
                </button>

                <button class="orange" onclick="deleteValue()">
                    <i class="fa-solid fa-delete-left"></i>
                </button>

                <button class="yellow" onclick="append('%')">
                    %
                </button>

                <button class="blue" onclick="append('/')">
                    ÷
                </button>

                <button onclick="append('7')">7</button>

                <button onclick="append('8')">8</button>

                <button onclick="append('9')">9</button>

                <button class="operator" onclick="append('*')">×</button>

                <button onclick="append('4')">4</button>

                <button onclick="append('5')">5</button>

                <button onclick="append('6')">6</button>

                <button class="operator" onclick="append('-')">−</button>

                <button onclick="append('1')">1</button>

                <button onclick="append('2')">2</button>

                <button onclick="append('3')">3</button>

                <button class="operator" onclick="append('+')">+</button>

                <button onclick="append('0')">0</button>

                <button onclick="append('.')">.</button>

                <button class="equal" onclick="calculate()">
                    =
                </button>

            </div>

        </div>

    </div>

    <!-- Success Popup -->

    <div id="popup">

        🎉 Great Job! 🎉

    </div>

    <!-- Button Click Sound -->

    <audio id="click">

        <source src="sounds/click.mp3" type="audio/mpeg">

    </audio>

    <!-- Success Sound -->

    <audio id="success">

        <source src="sounds/success.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>
